<c-vars
    id=""
    label=""
    hint=""
    required=""
    error=""
/>


{# Label #}
  <label class="usa-label{% if error %} usa-label--error{% endif %} {{ label_classes }}" for="{{ id }}">
    {{ label|safe }}
    {% if required %}
        <c-label.required-marker />
    {% endif %}
  </label>
  
  {# Optional hint text #}
  {% if hint %}
    <div class="usa-hint" id="{{ id }}-hint">{{ hint|safe }}</div>
  {% endif %}
