<c-vars
    legend=""
    legend_type=""
    required=""
    class="usa-fieldset"
/>

  <fieldset class="{{ class }}" {{ attrs }}>
    <legend class="usa-legend  usa-legend--{{ legend_type }}">
        {{ legend }}

        {% if required %}
            <c-label.required-marker />
        {% endif %}
    </legend>
    {{ slot|safe }}
  </fieldset>
