{% load static %}
<c-vars
    header_text=""
    header_action=""
    control_id=""
    is_gov=""
    content_primary=""
    content_secondary=""
    custom_content=""
/>

<section
  class="usa-banner"
  aria-label="Official website of the United States government"
>  
<div class="usa-accordion">
    <header class="usa-banner__header">
      <div class="usa-banner__inner">
        {% if is_gov == 'true' %}
        <div class="grid-col-auto">
          <img
            aria-hidden="true"
            class="usa-banner__header-flag"
            src="{% static 'frontend/uswds/img/us_flag_small.png' %}"
            alt=""
          />
        </div>
        {% endif %}
        <div class="grid-col-fill tablet:grid-col-auto" aria-hidden="true">
          <p class="usa-banner__header-text">
            {{ header_text }}
          </p>
          <p class="usa-banner__header-action">{{ header_action }}</p>
        </div>
        <button
          type="button"
          class="usa-accordion__button usa-banner__button"
          aria-expanded="false"
          aria-controls="{{ control_id }}"
        >
          <span class="usa-banner__button-text">{{ header_action }}</span>
        </button>
        
      </div>
    </header>
    <div
      class="usa-banner__content usa-accordion__content"
      id="{{ control_id }}"
    >
      <div class="grid-row grid-gap-lg">
        {% if is_gov == 'true' %}
        <div class="usa-banner__guidance tablet:grid-col-6">
          <img
            class="usa-banner__icon usa-media-block__img"
            src="{% static 'frontend/uswds/img/icon-dot-gov.svg' %}"
            role="img"
            alt=""
            aria-hidden="true"
          />
          <div class="usa-media-block__body">
            {{ content_primary }}
          </div>
        </div>
        <div class="usa-banner__guidance tablet:grid-col-6">
          <img
            class="usa-banner__icon usa-media-block__img"
            src="{% static 'frontend/uswds/img/icon-https.svg' %}"
            role="img"
            alt=""
            aria-hidden="true"
          />
          <div class="usa-media-block__body">
            {{ content_secondary }}
          </div>
        </div>
        {% endif %}
        {% if is_gov == 'false' %}
            {{ custom_content|safe }}
        {% endif %}
      </div>
    </div>
  </div>
</section>
