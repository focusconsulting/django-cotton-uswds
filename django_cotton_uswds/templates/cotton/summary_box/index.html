<c-vars
    heading_level="h4"
    heading=""
    id=""
/>

<div class="usa-summary-box" role="region" aria-labelledby="{{ id|default:heading|slugify }}">
  <div class="usa-summary-box__body">
    {% if heading %}
    <{{ heading_level }} class="usa-summary-box__heading" id="{{ id|default:heading|slugify }}">
      {{ heading }}
    </{{ heading_level }}>
    {% endif %}
    <div class="usa-summary-box__text">
      {{ slot }}
    </div>
  </div>
</div>
