name: Range Slider
context:
  variants:
    - title: "Basic Range Slider"
      id: "range-basic"
      name: "basic"
      label: "Range slider"
      min: "0"
      max: "100"
      step: "1"
      value: "20"

    - title: "Range Slider with Hint"
      id: "range-hint"
      name: "hint"
      label: "Range slider with hint"
      hint: "Adjust the slider to select a value"
      min: "0"
      max: "100"
      step: "1"
      value: "50"

    - title: "Range Slider with Custom Range"
      id: "range-custom"
      name: "custom"
      label: "Temperature (°F)"
      hint: "Select your preferred temperature"
      min: "60"
      max: "80"
      step: "1"
      value: "72"

    - title: "Range Slider with Steps"
      id: "range-steps"
      name: "steps"
      label: "Volume level"
      hint: "Adjusts in increments of 10"
      min: "0"
      max: "100"
      step: "10"
      value: "50"

    - title: "Range Slider with Error"
      id: "range-error"
      name: "error"
      label: "Range slider with error"
      hint: "Please select a valid value"
      error: "This field is required"
      min: "0"
      max: "100"
      step: "1"
      value: ""

    - title: "Required Range Slider"
      id: "range-required"
      name: "required"
      label: "Required range slider"
      required: "true"
      min: "0"
      max: "100"
      step: "1"
      value: "30"

    - title: "Disabled Range Slider"
      id: "range-disabled"
      name: "disabled"
      label: "Disabled range slider"
      hint: "This slider is disabled"
      disabled: "true"
      min: "0"
      max: "100"
      step: "1"
      value: "60"

    - title: "Readonly Range Slider"
      id: "range-readonly"
      name: "readonly"
      label: "Readonly range slider"
      hint: "This slider is readonly"
      readonly: "true"
      min: "0"
      max: "100"
      step: "1"
      value: "75"
