name: Text Input
context:
  variants:
    - title: "Basic Text Input"
      id: "input-basic"
      name: "basic"
      label: "Text input label"
      type: "text"


    - title: "Text Input with Hint"
      id: "input-hint"
      name: "hint"
      label: "Text input with hint"
      type: "text"
      value: ""
      hint: "This is a helpful hint message"
      error: ""
      success: ""
      disabled: ""
      readonly: ""
      required: ""
      width: ""


    - title: "Text Input with Error"
      id: "input-error"
      name: "error"
      label: "Text input with error"
      type: "text"
      value: ""
      hint: ""
      error: "This field is required"
      success: ""
      disabled: ""
      readonly: ""
      required: ""
      width: ""


    - title: "Text Input with Success"
      id: "input-success"
      name: "success"
      label: "Text input with success"
      type: "text"
      value: "Valid input"
      hint: ""
      error: ""
      success: "true"
      disabled: ""
      readonly: ""
      required: ""
      width: ""


    - title: "Small Width Input"
      id: "input-small"
      name: "small"
      label: "Small text input"
      type: "text"
      value: ""
      hint: ""
      error: ""
      success: ""
      disabled: ""
      readonly: ""
      required: ""
      width: "sm"


    - title: "Medium Width Input"
      id: "input-medium"
      name: "medium"
      label: "Medium text input"
      type: "text"
      value: ""
      hint: ""
      error: ""
      success: ""
      disabled: ""
      readonly: ""
      required: ""
      width: "md"


    - title: "Disabled Input"
      id: "input-disabled"
      name: "disabled"
      label: "Disabled text input"
      type: "text"
      value: "This is disabled"
      hint: ""
      error: ""
      success: ""
      disabled: "true"
      readonly: ""
      required: ""
      width: ""


    - title: "Readonly Input"
      id: "input-readonly"
      name: "readonly"
      label: "Readonly text input"
      type: "text"
      value: "This is readonly"
      hint: ""
      error: ""
      success: ""
      disabled: ""
      readonly: "true"
      required: ""
      width: ""


    - title: "Required Input"
      id: "input-required"
      name: "required"
      label: "Required text input"
      type: "text"
      value: ""
      hint: ""
      error: ""
      success: ""
      disabled: ""
      readonly: ""
      required: "true"
      width: ""


    - title: "Input with Maxlength"
      id: "input-maxlength"
      name: "maxlength"
      label: "Text input with max length"
      type: "text"
      value: ""
      hint: "Maximum 10 characters"
      error: ""
      success: ""
      disabled: ""
      readonly: ""
      required: ""
      width: ""
      maxlength: "10"


    - title: "Social Security Number"
      id: "input-ssn"
      name: "ssn"
      label: "Social Security Number"
      type: "text"
      hint: "Format: XXX-XX-XXXX"
      placeholder: "___-__-____"
      pattern: "^(?!(000|666|9))\\d{3} (?!00)\\d{2} (?!0000)\\d{4}$"
      input_classes: "usa-masked"
      inputmode: "numeric"
      aria-describedby: "ssnHint"


    - title: "US Telephone Number Input Mask"
      id: "input-tel"
      name: "tel"
      label: "US Telephone Number"
      type: "text"
      hint: "Format: (XXX) XXX-XXXX"
      placeholder: "(___) ___-____"
      pattern: "^\\(\\d{3}\\) \\d{3}-\\d{4}$"
      input_classes: "usa-masked"
      inputmode: "numeric"
      aria-describedby: "telHint"

    - title: "9 Digit US ZIP Code Input Mask"
      id: "input-zip9"
      name: "zip9"
      label: "9 Digit US ZIP Code"
      type: "text"
      hint: "Format: XXXXX-XXXX"
      placeholder: "_____-____"
      pattern: "^\\d{5}(-\\d{4})?$"
      input_classes: "usa-masked"
      inputmode: "numeric"
      aria-describedby: "zip9Hint"
  

    - title: "Alphanumeric Input Mask"
      id: "input-alphanumeric"
      name: "alphanumeric"
      label: "Alphanumeric Input"
      type: "text"
      hint: "Format: A1A 2B3"
      placeholder: "___ ___"
      pattern: "\\w\\d\\w \\d\\w\\d"
      input_classes: "usa-masked"
      inputmode: "text"
      aria_describedby: "alphanumericHint"
      data_charset: "A#A #A#"