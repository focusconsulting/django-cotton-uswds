{% extends "demo_app/pattern_base.html" %}

{% block component_content %}
<h1 class="font-heading-2xl">{{ component_name }}</h1>
<p class="usa-intro">Render a complete Django form using the USWDS form renderer.</p>

<form class="usa-form usa-form--large" method="post" novalidate>
    {% csrf_token %}
    {{ form }}
    <c-button type="submit" text="Submit" />
</form>
{% endblock %}
